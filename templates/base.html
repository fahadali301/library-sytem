<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Library Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f3f6fb; color: #1f2937; }
        nav { background: #111827; padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        nav a { color: #e5e7eb; text-decoration: none; font-weight: 600; padding: 6px 8px; border-radius: 6px; }
        nav a:hover { color: #ffffff; background: #1f2937; }
        .container { max-width: 1080px; margin: 24px auto; background: #ffffff; padding: 24px; border-radius: 10px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; }
        .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; background: #f9fafb; }
        .card .label { color: #6b7280; font-size: 13px; }
        .card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .panel { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin-top: 16px; }
        .quick-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: left; }
        th { background: #f3f4f6; }
        .btn { display: inline-block; background: #2563eb; color: #fff; border: 0; border-radius: 6px; padding: 8px 12px; text-decoration: none; cursor: pointer; }
        .btn-secondary { background: #4b5563; }
        .btn-danger { background: #b91c1c; }
        .muted { color: #6b7280; font-size: 14px; }
        .messages { margin-bottom: 12px; padding: 0; }
        .messages li { background: #ecfeff; border: 1px solid #a5f3fc; list-style: none; padding: 8px; margin-bottom: 8px; border-radius: 6px; }
    </style>
</head>
<body>
<nav>
    <a href="/">Dashboard</a>
    <a href="/books/">Books</a>
    <a href="/books/add/">Add Book</a>
    <a href="/students/add/">Add Student</a>
    <a href="/books/issue/">Issue Book</a>
    <a href="/face-lookup/">Face Lookup</a>
</nav>
<div class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
